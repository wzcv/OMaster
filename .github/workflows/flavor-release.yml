name: Build Flavor APKs

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release
      create_release:
        description: '创建 Release (仅 release 类型时有效)'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release 标签 (例如: v1.2.3)'
        required: false
        type: string
      release_name:
        description: 'Release 名称 (留空则使用标签)'
        required: false
        type: string
      prerelease:
        description: '标记为预发布版本'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore (release only)
        if: github.event.inputs.build_type == 'release'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Build all flavors
        run: |
          if [[ "${{ github.event.inputs.build_type }}" == "release" ]]; then
            ./gradlew assembleLegacyXposedRelease assembleLibxposedRelease --no-daemon \
              -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          else
            ./gradlew assembleLegacyXposedDebug assembleLibxposedDebug --no-daemon
          fi

      - name: Upload legacyXposed Universal APK
        uses: actions/upload-artifact@v7
        with:
          name: legacyXposed-${{ github.event.inputs.build_type }}-universal
          path: app/build/outputs/apk/legacyXposed/${{ github.event.inputs.build_type }}/*-universal-*.apk
          retention-days: 30

      - name: Upload legacyXposed arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: legacyXposed-${{ github.event.inputs.build_type }}-arm64-v8a
          path: app/build/outputs/apk/legacyXposed/${{ github.event.inputs.build_type }}/*-arm64-v8a-*.apk
          retention-days: 30

      - name: Upload legacyXposed armeabi-v7a APK
        uses: actions/upload-artifact@v7
        with:
          name: legacyXposed-${{ github.event.inputs.build_type }}-armeabi-v7a
          path: app/build/outputs/apk/legacyXposed/${{ github.event.inputs.build_type }}/*-armeabi-v7a-*.apk
          retention-days: 30

      - name: Upload legacyXposed x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          name: legacyXposed-${{ github.event.inputs.build_type }}-x86_64
          path: app/build/outputs/apk/legacyXposed/${{ github.event.inputs.build_type }}/*-x86_64-*.apk
          retention-days: 30

      - name: Upload legacyXposed x86 APK
        uses: actions/upload-artifact@v7
        with:
          name: legacyXposed-${{ github.event.inputs.build_type }}-x86
          path: app/build/outputs/apk/legacyXposed/${{ github.event.inputs.build_type }}/*-x86-*.apk
          retention-days: 30

      - name: Upload libxposed Universal APK
        uses: actions/upload-artifact@v7
        with:
          name: libxposed-${{ github.event.inputs.build_type }}-universal
          path: app/build/outputs/apk/libxposed/${{ github.event.inputs.build_type }}/*-universal-*.apk
          retention-days: 30

      - name: Upload libxposed arm64-v8a APK
        uses: actions/upload-artifact@v7
        with:
          name: libxposed-${{ github.event.inputs.build_type }}-arm64-v8a
          path: app/build/outputs/apk/libxposed/${{ github.event.inputs.build_type }}/*-arm64-v8a-*.apk
          retention-days: 30

      - name: Upload libxposed armeabi-v7a APK
        uses: actions/upload-artifact@v7
        with:
          name: libxposed-${{ github.event.inputs.build_type }}-armeabi-v7a
          path: app/build/outputs/apk/libxposed/${{ github.event.inputs.build_type }}/*-armeabi-v7a-*.apk
          retention-days: 30

      - name: Upload libxposed x86_64 APK
        uses: actions/upload-artifact@v7
        with:
          name: libxposed-${{ github.event.inputs.build_type }}-x86_64
          path: app/build/outputs/apk/libxposed/${{ github.event.inputs.build_type }}/*-x86_64-*.apk
          retention-days: 30

      - name: Upload libxposed x86 APK
        uses: actions/upload-artifact@v7
        with:
          name: libxposed-${{ github.event.inputs.build_type }}-x86
          path: app/build/outputs/apk/libxposed/${{ github.event.inputs.build_type }}/*-x86-*.apk
          retention-days: 30

      - name: Package all APKs into zip
        run: |
          mkdir -p dist
          find app/build/outputs/apk -name "*.apk" | while read f; do
            flavor=$(echo "$f" | awk -F'/' '{print $(NF-2)}')
            filename=$(basename "$f")
            cp "$f" "dist/${flavor}-${filename}"
          done
          zip -j "OMaster-${{ github.event.inputs.build_type }}-all.zip" dist/*.apk
          echo "📦 打包完成，文件列表："
          ls -lh dist/

      - name: Upload all APKs zip
        uses: actions/upload-artifact@v7
        with:
          name: OMaster-${{ github.event.inputs.build_type }}-all
          path: OMaster-${{ github.event.inputs.build_type }}-all.zip
          retention-days: 30

  release:
    needs: build
    if: github.event.inputs.create_release == 'true' && github.event.inputs.build_type == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate release inputs
        run: |
          if [[ -z "${{ github.event.inputs.release_tag }}" ]]; then
            echo "❌ 错误: 创建 Release 时必须提供 release_tag"
            exit 1
          fi
          if [[ ! "${{ github.event.inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "❌ 错误: 标签格式不正确，请使用 vX.Y.Z 格式（例如 v1.2.3）"
            exit 1
          fi
          if git tag --list | grep -q "^${{ github.event.inputs.release_tag }}$"; then
            echo "❌ 错误: 标签 ${{ github.event.inputs.release_tag }} 已存在"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "📝 首个版本，生成所有提交的更新日志"
            git-cliff --unreleased --output RELEASE_NOTES.md
          else
            echo "📝 生成从 $PREVIOUS_TAG 到当前提交的更新日志"
            git-cliff ${PREVIOUS_TAG}..HEAD --unreleased --output RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md

      - name: Create and push tag
        run: |
          git tag ${{ github.event.inputs.release_tag }}
          git push origin ${{ github.event.inputs.release_tag }}

      - name: Download APK artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./apk
          merge-multiple: true

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_name || github.event.inputs.release_tag }}
          body_path: RELEASE_NOTES.md
          draft: true
          prerelease: ${{ github.event.inputs.prerelease }}
          files: ./apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "🎉 Release 草稿创建成功！"
          echo "  标签: ${{ github.event.inputs.release_tag }}"
          echo "  名称: ${{ github.event.inputs.release_name || github.event.inputs.release_tag }}"
          echo "  预发布: ${{ github.event.inputs.prerelease }}"
          echo "🔗 查看地址: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.release_tag }}"
